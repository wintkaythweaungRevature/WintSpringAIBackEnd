name: Java CI/CD with Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests
      env:
        SPRING_AI_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/spring-ai-app:latest
        # No build-args for secrets — all secrets are injected at container runtime.
        # Required runtime environment variables for the container:
        #   SPRING_AI_OPENAI_API_KEY  → secrets.OPENAI_API_KEY
        #   JWT_SECRET                → secrets.JWT_SECRET
        #   STRIPE_SECRET_KEY         → secrets.STRIPE_SECRET_KEY
        #   STRIPE_WEBHOOK_SECRET     → secrets.STRIPE_WEBHOOK_SECRET
