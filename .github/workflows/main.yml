# .github/workflows/main.yml
name: Java CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn clean package -DskipTests  # ဒီမှာ working-directory မလိုတော့ဘူး
      # ... ကျန်တဲ့ Docker အဆင့်တွေ ဆက်ရေးပါ ...