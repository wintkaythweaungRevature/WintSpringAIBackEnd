# Server Port
server.port=8080

spring.mvc.static-path-pattern=/**

# Database (H2 for dev - change to PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:wintai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-at-least-32-chars}
jwt.expiration-ms=86400000

# Stripe - set these in env or override for production
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_your_stripe_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}
# Create prices in Stripe Dashboard and set IDs here
stripe.price.basic=${STRIPE_PRICE_BASIC:price_xxx}
stripe.price.pro=${STRIPE_PRICE_PRO:price_xxx}
# 1. OpenAI Configuration
# မှန်ကန်တဲ့ ရေးနည်း (Variable ကို ခေါ်သုံးခြင်း)
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
spring.ai.openai.api-url=${SPRING_AI_OPENAI_API_URL:https://api.openai.com}

spring.ai.openai.audio.transcription.base-url=https://api.openai.com
spring.ai.openai.audio.transcription.options.model=whisper-1
spring.ai.openai.audio.transcription.options.response-format=json
# Max file size (e.g., 50MB)
spring.servlet.multipart.max-file-size=50MB
# Max request size (total of all files + form data)
spring.servlet.multipart.max-request-size=50MB
# Multipart resolve လုပ်တဲ့ အစီအစဉ်ကို security filter မတိုင်ခင် ထားရန်
spring.servlet.multipart.resolve-lazily=true
# Tier ပြဿနာမတက်အောင် gpt-3.5-turbo ကိုပဲ အရင်သုံးပါ
spring.ai.openai.chat.options.model=gpt-3.5-turbo

# 2. Logging (Error အစစ်ကို Console မှာ မြင်ရဖို့)
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web=DEBUG

