# Server Port
server.port=8080

# Fix duplicate vectorStore bean conflict between RagConfig and PgVectorStoreAutoConfiguration
spring.main.allow-bean-definition-overriding=true

spring.mvc.static-path-pattern=/**
# Database - AWS RDS PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://database-1.cnom6ku8g3n1.us-east-2.rds.amazonaws.com:5432/postgres?sslmode=require}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:wintkaythweaung}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-at-least-32-chars}
jwt.expiration-ms=86400000

# Stripe - set STRIPE_SECRET_KEY env var; placeholder triggers clear "not configured" error if env not set
stripe.api.key=${STRIPE_SECRET_KEY:your_stripe_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}
stripe.price.member=${STRIPE_PRICE_MEMBER:price_1T9wNI64XP2DAi8NUBtSQg02}
# 1. OpenAI Configuration
# မှန်ကန်တဲ့ ရေးနည်း (Variable ကို ခေါ်သုံးခြင်း)
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:${OPENAI_API_KEY:}}
spring.ai.openai.api-url=${SPRING_AI_OPENAI_API_URL:https://api.openai.com}

spring.ai.openai.audio.transcription.base-url=https://api.openai.com
spring.ai.openai.audio.transcription.options.model=whisper-1
spring.ai.openai.audio.transcription.options.response-format=json
# Max file size (e.g., 50MB)
spring.servlet.multipart.max-file-size=50MB
# Max request size (total of all files + form data)
spring.servlet.multipart.max-request-size=50MB
# Multipart resolve လုပ်တဲ့ အစီအစဉ်ကို security filter မတိုင်ခင် ထားရန်
spring.servlet.multipart.resolve-lazily=true
# Tier ပြဿနာမတက်အောင် gpt-3.5-turbo ကိုပဲ အရင်သုံးပါ
spring.ai.openai.chat.options.model=gpt-3.5-turbo

# RAG / Embeddings
rag.enabled=true
spring.ai.openai.embedding.options.model=text-embedding-3-small

# 2. Logging (Error အစစ်ကို Console မှာ မြင်ရဖို့)
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web=DEBUG

# Stripe - set via env: STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_MEMBER

# Social Media OAuth (set via environment variables on EC2)
social.redirect.base-url=${SOCIAL_REDIRECT_BASE_URL:https://api.wintaibot.com}
social.frontend-url=${SOCIAL_FRONTEND_URL:https://www.wintaibot.com}
social.youtube.client-id=${YOUTUBE_CLIENT_ID:}
social.youtube.client-secret=${YOUTUBE_CLIENT_SECRET:}
social.instagram.app-id=${INSTAGRAM_APP_ID:}
social.instagram.app-secret=${INSTAGRAM_APP_SECRET:}
social.tiktok.client-key=${TIKTOK_CLIENT_KEY:}
social.tiktok.client-secret=${TIKTOK_CLIENT_SECRET:}
social.linkedin.client-id=${LINKEDIN_CLIENT_ID:}
social.linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:}
social.x.client-id=${X_CLIENT_ID:}
social.x.client-secret=${X_CLIENT_SECRET:}

# Video upload limit (500MB for video files)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# AWS S3 (for video storage) - use IAM role on EC2 or set credentials
aws.region=${AWS_REGION:us-east-2}
aws.s3.bucket=${AWS_S3_BUCKET:springai-videos}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}

# FFmpeg path (for video resize/clip) - install ffmpeg on server
ffmpeg.path=${FFMPEG_PATH:ffmpeg}
