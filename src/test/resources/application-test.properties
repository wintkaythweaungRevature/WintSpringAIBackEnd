# ─── Database: H2 in-memory for tests ───────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=test-jwt-secret-key-must-be-at-least-32-chars-long-for-hmac
jwt.expiration-ms=3600000

# ─── Spring AI (fake key — no real calls in tests) ───────────────────────────
spring.ai.openai.api-key=sk-test-fake-key-not-real

# ─── Stripe (fake key — StripeService is @MockBean in tests) ─────────────────
stripe.secret.key=sk_test_fake_not_real

# ─── RAG disabled in tests (H2 doesn't have pgvector extension) ──────────────
rag.enabled=false

# ─── Disable noisy startup logs ──────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.example=INFO
